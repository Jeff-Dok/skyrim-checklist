<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d0f" />
    <title>Skyrim Checklist — Personnages</title>

    <link rel="preload" href="assets/images/logos/logo_title.webp" as="image" fetchpriority="high" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

    <main class="welcome-page">

      <div class="welcome-inner">

        <!-- Logo -->
        <img
          class="welcome-logo"
          src="assets/images/logos/logo_title.webp"
          alt="Skyrim"
          width="512"
          height="224"
          fetchpriority="high"
        />

        <!-- Titre page -->
        <h1 class="welcome-title">Choisir un personnage</h1>

        <!-- Ligne décorative -->
        <div class="welcome-divider"></div>

        <!-- Liste des profils -->
        <div id="profileList" class="welcome-profile-list" role="list"></div>

        <!-- Formulaire nouveau personnage -->
        <div class="welcome-new-wrap">
          <p class="welcome-new-label">Nouveau personnage</p>
          <div class="welcome-new-form">
            <input
              type="text"
              id="profileNameInput"
              class="welcome-name-input"
              placeholder="Nom du personnage…"
              maxlength="30"
              autocomplete="off"
              aria-label="Nom du nouveau personnage"
            />
            <button class="welcome-btn-create" id="btnCreate">Créer</button>
          </div>
        </div>

      </div>

    </main>

    <script src="script/profiles.js"></script>
    <script>
      /* ── Utilitaires ── */
      function escHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      /* ── Redirection vers la checklist ── */
      function playProfile(id) {
        localStorage.setItem(ACTIVE_PROFILE_KEY, id);
        window.location.href = 'skyrim.html';
      }

      /* ── Suppression d'un profil ── */
      function confirmDeleteProfile(id, name) {
        if (!confirm(`Supprimer le personnage "${name}" ?\nCette action est irréversible.`)) return;
        deleteProfile(id);
        renderProfiles();
      }

      /* ── Rendu de la liste des profils ── */
      function renderProfiles() {
        const profiles = getProfiles();
        const list = document.getElementById('profileList');

        if (profiles.length === 0) {
          list.innerHTML = '<p class="welcome-empty">Aucun personnage — créez-en un ci-dessous.</p>';
          return;
        }

        list.innerHTML = profiles.map(p => {
          const done = getProfileDone(p.id);
          const date = new Date(p.createdAt).toLocaleDateString('fr-CA');
          return `
<div class="welcome-profile-card" role="listitem">
  <div class="welcome-card-info">
    <span class="welcome-card-name">${escHtml(p.name)}</span>
    <span class="welcome-card-meta">${done} items · créé le ${date}</span>
  </div>
  <div class="welcome-card-actions">
    <button class="welcome-btn-play" onclick="playProfile('${p.id}')">&#9654; Jouer</button>
    <button class="welcome-btn-delete" onclick="confirmDeleteProfile('${p.id}', '${escHtml(p.name).replace(/'/g, '&#39;')}')" aria-label="Supprimer ${escHtml(p.name)}">✕</button>
  </div>
</div>`;
        }).join('');
      }

      /* ── Création d'un nouveau personnage ── */
      function handleCreate() {
        const input = document.getElementById('profileNameInput');
        const name = (input.value || '').trim();
        if (!name) { input.focus(); return; }
        const profile = createProfile(name);
        playProfile(profile.id);
      }

      /* ── Init ── */
      migrateV1IfNeeded();
      renderProfiles();

      document.getElementById('btnCreate').addEventListener('click', handleCreate);
      document.getElementById('profileNameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleCreate();
      });
    </script>

  </body>
</html>
