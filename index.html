<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d0f" />
    <link rel="icon" type="image/x-icon" href="assets/images/logos/favicon.ico" />
    <title>Skyrim AE Checklist — Personnages</title>

    <link rel="preload" href="assets/images/logos/logo_title.webp" as="image" fetchpriority="high" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

    <!-- Bouton langue — fixé en haut à droite -->
    <button class="lang-btn" onclick="toggleLang()"></button>

    <main class="welcome-page">

      <div class="welcome-inner">

        <!-- Logo + titre -->
        <div class="welcome-hero">
          <img
            class="welcome-logo"
            src="assets/images/logos/logo_title.webp"
            alt="Skyrim"
            width="512"
            height="224"
            fetchpriority="high"
          />
          <p class="welcome-checklist-label">Checklist</p>
        </div>

        <!-- Titre section — injecté par JS (i18n) -->
        <h1 class="welcome-title" id="welcomeTitle"></h1>

        <!-- Ligne décorative -->
        <div class="welcome-divider"></div>

        <!-- Liste des profils -->
        <div id="profileList" class="welcome-profile-list" role="list"></div>

        <!-- Formulaire nouveau personnage -->
        <div class="welcome-new-wrap">
          <p class="welcome-new-label" id="newCharLabel"></p>
          <div class="welcome-divider"></div>
          <div class="welcome-new-form">
            <input
              type="text"
              id="profileNameInput"
              class="welcome-name-input"
              placeholder=""
              maxlength="30"
              autocomplete="off"
              aria-label="New character name"
            />
            <button class="welcome-btn-create" id="btnCreate"></button>
          </div>
        </div>

      </div>

    </main>

    <script src="script/i18n.js"></script>
    <script src="script/profiles.js"></script>
    <script>
      /* ── Utilitaires ── */
      function escHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      /* ── Applique les traductions aux éléments statiques ── */
      function applyI18n() {
        document.getElementById('welcomeTitle').textContent    = t('selectTitle');
        document.getElementById('newCharLabel').textContent    = t('newCharacter');
        document.getElementById('profileNameInput').placeholder = t('placeholder');
        document.getElementById('btnCreate').textContent       = t('btnCreate');
        document.querySelector('.lang-btn').textContent        = t('langBtn');
      }

      /* ── Redirection vers la checklist ── */
      function playProfile(id) {
        localStorage.setItem(ACTIVE_PROFILE_KEY, id);
        window.location.href = 'skyrim.html';
      }

      /* ── Suppression d'un profil ── */
      function confirmDeleteProfile(id, name) {
        if (!confirm(t('deleteConfirm')(name))) return;
        deleteProfile(id);
        renderProfiles();
      }

      /* ── Rendu de la liste des profils ── */
      function renderProfiles() {
        const profiles = getProfiles();
        const list = document.getElementById('profileList');
        const inner = document.querySelector('.welcome-inner');
        const titleEl = document.getElementById('welcomeTitle');
        const locale = getLang() === 'fr' ? 'fr-CA' : 'en-CA';

        if (profiles.length === 0) {
          inner.classList.add('welcome-inner--first-run');
          titleEl.textContent = t('firstRunTitle');
          const sub = document.createElement('p');
          sub.className = 'welcome-first-run-sub';
          sub.textContent = t('firstRunSub');
          list.innerHTML = '';
          list.appendChild(sub);
          document.getElementById('profileNameInput').focus();
          return;
        }

        inner.classList.remove('welcome-inner--first-run');
        titleEl.textContent = t('selectTitle');

        list.innerHTML = profiles.map(p => {
          const pct  = getProfilePct(p.id);
          const date = new Date(p.createdAt).toLocaleDateString(locale);
          return `
<div class="welcome-profile-card" role="listitem">
  <div class="welcome-card-info">
    <span class="welcome-card-name">${escHtml(p.name)}</span>
    <span class="welcome-card-meta">${pct} · ${t('metaCreated')} ${date}</span>
  </div>
  <div class="welcome-card-actions">
    <button class="welcome-btn-play" onclick="playProfile('${p.id}')">${t('btnPlay')}</button>
    <button class="welcome-btn-delete" onclick="confirmDeleteProfile('${p.id}', '${escHtml(p.name).replace(/'/g, '&#39;')}')" aria-label="Delete ${escHtml(p.name)}">✕</button>
  </div>
</div>`;
        }).join('');
      }

      /* ── Création d'un nouveau personnage ── */
      function handleCreate() {
        const input = document.getElementById('profileNameInput');
        const name = (input.value || '').trim();
        if (!name) { input.focus(); return; }
        const profile = createProfile(name);
        playProfile(profile.id);
      }

      /* ── Init ── */
      migrateV1IfNeeded();
      applyI18n();
      renderProfiles();

      document.getElementById('btnCreate').addEventListener('click', handleCreate);
      document.getElementById('profileNameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleCreate();
      });
    </script>

  </body>
</html>
